# 2-Stage training config for SAGE on Colon Cancer Segmentation (ECCV)
# ConvNeXt-Large + ViT-Large + SAGE architecture
# Dataset: 27,321 train / 7,528 val / 5,939 test
# Launch: torchrun --nproc_per_node=8 train_2stage_sage_ddp.py --config eccv/config/config_sage_colon.yaml

################################################################################
# DATA CONFIGURATION
################################################################################
data:
  dataset_config: "configs/datasets/colon.yaml"
  img_size: 512           # MUST match model.img_size
  batch_size: 4           # per-GPU batch (8 GPUs x 4 = 32 effective)
  num_workers: 4          # per-process (8 procs x 4 = 32 total workers)
  pin_memory: true

################################################################################
# MODEL CONFIGURATION
################################################################################
model:
  name: "ConvNeXt_Transformer_UNet"
  num_classes: 2
  img_size: 512           # MUST match data.img_size
  use_sage: true
  convnext_variant: "convnext_large"
  vit_variant: "vit_large_patch32_224"
  num_transformer_layers: 24
  freeze_encoder: false
  freeze_transformer: false
  gradient_checkpointing: false  # disabled: too slow with 24 transformer layers

################################################################################
# SAGE CONFIGURATION
################################################################################
sage:
  top_k: 4
  gating_type: "sigmoid"
  expert_dropout: 0.1
  router_hidden_dim: 256
  load_balance_factor: 0.001
  shared_expert_indices: []   # auto-pick first K during Stage 2

################################################################################
# 2-STAGE TRAINING CONFIGURATION
################################################################################
training:
  stage1_epochs: 100
  stage2_epochs: 300
  num_shared_experts: 4
  # DDP: launched via torchrun --nproc_per_node=8, LOCAL_RANK set automatically by torchrun
  use_amp: true                # BF16 mixed precision — ~40% faster on A100, no accuracy loss
  base_lr: 0.0001
  stage2_base_lr: 0.0001
  stage2_shared_lr: 0.0005
  optimizer: "AdamW"
  weight_decay: 0.0001
  momentum: 0.9
  scheduler: "CosineAnnealingLR"
  early_stopping:
    patience: 15
    delta: 0.0001
  seed: 42

################################################################################
# OUTPUT & LOGGING CONFIGURATION
################################################################################
output:
  experiment_name: "eccv_sage_colon"

logging:
  visualization_frequency: 10
  visualization_samples: 3

################################################################################
# WSI EVALUATION CONFIGURATION
################################################################################
wsi:
  raw_pos_path: "/path/to/Colon/tissue-train-pos-v1"
  raw_neg_path: "/path/to/Colon/tissue-train-neg"
